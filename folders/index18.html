    <script>
  AOS.init();
</script>
<script>
  const track = document.querySelector('.carousel-track');
  const images = document.querySelectorAll('.carousel img');

  let index = 0;

  setInterval(() => {
    index++;

    if (index >= images.length) {
      index = 0;
    }

    track.style.transform = `translateX(-${index * 100}%)`;
  }, 3000); // troca a cada 3 segundos
</script>
